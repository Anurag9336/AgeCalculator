<!DOCTYPE html>
<html>
    <head>
        <title>Age Calculator</title>
        <style>
            body{
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background: linear-gradient(45deg,#6bcBff,#6bff95);
                font-family: Arial;
            }
            .container{
                background: white;
                padding: 40px;
                border-radius: 10px;
                box-shadow: 0 0 10px rgba(0,0,0,0.2);
                text-align: center;
            }
            input{
                padding: 10px;
                margin: 10px;
                font-size: 16px;
            }

            button{
                padding: 10px 20px;
                font-size: 16px;
                background: #3498db;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                transition: 0.3s;
            }
            button:hover{
                background: #2980b9;
                transform: scale(1.1);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <input type="date" id="DOB">
            
            <button onclick="calculateAge()">Calculate Age</button>
            <h2 id="result"></h2>
        </div>
        <script>
            function calculateAge(){
                let DOB = document.getElementById("DOB").value;
                if(DOB == ""){
                    document.getElementById("result").innerText="PLease Select Your Date Of Birth";
                    return;
                }
                let birthDate=new Date(DOB);
                let today = new Date();
                let age = today.getFullYear()- birthDate.getFullYear();

                document.getElementById("result").innerText="Your Age is" + age + "years";
            }
        </script>
    </body>
</html>
